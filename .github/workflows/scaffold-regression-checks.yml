name: Scaffold Regression Checks

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "scaffold/agent-vault/**"
      - "scaffold/root/*.md"
      - "scaffold/root/scripts/**"
      - "scaffold/root/docs/runbooks/**"
      - "scripts/new-project.sh"
      - "scripts/update-project.sh"
      - "scripts/test-gitignore-management.sh"
      - "scripts/test-coding-standards-sync.sh"
      - "scripts/test-decision-template-sync.sh"
      - "scripts/test-session-metadata-hook.sh"
      - "scripts/test-main-push-gate.sh"
      - "scripts/test-session-start-load-contract.sh"
      - "scripts/test-path-expansion.sh"
      - "scripts/test-new-worktree.sh"
      - "scripts/test-remove-worktree.sh"
      - "scripts/test-worktree-helper-sync.sh"
      - ".github/workflows/scaffold-regression-checks.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "scaffold/agent-vault/**"
      - "scaffold/root/*.md"
      - "scaffold/root/scripts/**"
      - "scaffold/root/docs/runbooks/**"
      - "scripts/new-project.sh"
      - "scripts/update-project.sh"
      - "scripts/test-gitignore-management.sh"
      - "scripts/test-coding-standards-sync.sh"
      - "scripts/test-decision-template-sync.sh"
      - "scripts/test-session-metadata-hook.sh"
      - "scripts/test-main-push-gate.sh"
      - "scripts/test-session-start-load-contract.sh"
      - "scripts/test-path-expansion.sh"
      - "scripts/test-new-worktree.sh"
      - "scripts/test-remove-worktree.sh"
      - "scripts/test-worktree-helper-sync.sh"
      - ".github/workflows/scaffold-regression-checks.yml"
  workflow_dispatch:

jobs:
  scaffold-regression-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify managed .gitignore handling
        run: bash scripts/test-gitignore-management.sh
      - name: Verify coding standards sync behavior
        run: bash scripts/test-coding-standards-sync.sh
      - name: Verify policy template sync behavior
        run: bash scripts/test-decision-template-sync.sh
      - name: Verify session metadata hook behavior
        run: bash scripts/test-session-metadata-hook.sh
      - name: Verify main push metadata gate
        run: bash scripts/test-main-push-gate.sh
      - name: Verify session-start load contract
        run: bash scripts/test-session-start-load-contract.sh
      - name: Verify path expansion handling
        run: bash scripts/test-path-expansion.sh
      - name: Verify worktree creation helper
        run: bash scripts/test-new-worktree.sh
      - name: Verify worktree removal helper
        run: bash scripts/test-remove-worktree.sh
      - name: Verify worktree helper scaffold sync
        run: bash scripts/test-worktree-helper-sync.sh
